<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏨 TEE(n) Land Hotel Lobby — Exchange Bridge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800;900&display=swap');

:root {
  --bg: #020508;
  --surface: #050b14;
  --surface-hover: #081220;
  --border: rgba(255,255,255,0.05);
  --fg: #94a3b8;
  --dim: #475569;
  --white: #f8fafc;
  --emerald: #34d399;
  --sky: #38bdf8;
  --purple: #a78bfa;
  --pink: #f472b6;
  --gold: #fbbf24;
  --red: #f87171;
  --teal: #2dd4bf;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg); color: var(--fg);
  font-family: 'JetBrains Mono', monospace;
  min-height: 100vh; padding: 32px;
  selection { background: rgba(56,189,248,0.3); }
}

/* ─── Header ─────────────────── */
header {
  margin-bottom: 48px; padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: flex-end;
}

h1 {
  font-family: 'Inter', sans-serif;
  font-size: 28px; font-weight: 900; color: var(--white);
  text-transform: uppercase; letter-spacing: -1px;
  display: flex; align-items: center; gap: 12px;
}

h1 .icon { color: var(--sky); font-size: 24px; }

.header-sub {
  font-size: 10px; color: var(--sky); margin-top: 8px;
  letter-spacing: 4px; text-transform: uppercase;
}

.node-badge {
  font-size: 9px; background: #000; border: 1px solid var(--border);
  padding: 6px 14px; border-radius: 20px; letter-spacing: 3px;
  text-transform: uppercase; color: var(--emerald);
}

/* ─── Node Grid ──────────────── */
.node-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px; margin-bottom: 32px;
}

.node-card {
  background: var(--surface); border-top: 4px solid var(--emerald);
  border-radius: 10px; padding: 24px; cursor: pointer;
  transition: all 0.2s; position: relative; overflow: hidden;
}

.node-card:hover { background: var(--surface-hover); }

.node-card.active {
  box-shadow: 0 0 0 2px rgba(56,189,248,0.3);
}

.node-card.border-emerald { border-top-color: var(--emerald); }
.node-card.border-purple { border-top-color: var(--purple); }
.node-card.border-sky { border-top-color: var(--sky); }
.node-card.border-pink { border-top-color: var(--pink); }
.node-card.border-gold { border-top-color: var(--gold); }
.node-card.border-red { border-top-color: var(--red); }
.node-card.border-teal { border-top-color: var(--teal); }

.node-emoji { font-size: 36px; margin-bottom: 16px; }

.node-name {
  font-family: 'Inter', sans-serif;
  font-size: 15px; font-weight: 700; color: var(--white); margin-bottom: 4px;
}

.node-type {
  font-size: 9px; color: var(--dim); text-transform: uppercase;
  letter-spacing: 4px; margin-bottom: 20px;
}

.node-footer {
  display: flex; justify-content: space-between; align-items: center;
}

.node-status {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 2px;
}

.status-active { color: var(--emerald); }
.status-synced { color: var(--purple); }
.status-rooted { color: var(--sky); }
.status-armed { color: var(--gold); }
.status-patrol { color: var(--teal); }
.status-drip { color: var(--pink); }

.node-git {
  width: 16px; height: 16px; opacity: 0.2;
}

/* ─── Terminal ───────────────── */
.terminal {
  background: #000; border: 1px solid var(--border);
  border-radius: 10px; padding: 24px; margin-bottom: 32px;
}

.terminal-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 16px; padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.terminal-icon { color: var(--sky); font-size: 16px; }

.terminal-title {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 4px; color: var(--white);
}

.terminal-log { font-size: 11px; line-height: 2; }
.terminal-log .cmd { color: var(--sky); }
.terminal-log .ok { color: var(--emerald); }
.terminal-log .dim { color: var(--dim); }

/* ─── Emoji Sequence Quick-Bar ─ */
.emoji-bar {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 32px;
}

.emoji-btn {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 14px; cursor: pointer;
  font-size: 16px; transition: all 0.15s;
  display: flex; align-items: center; gap: 8px;
}

.emoji-btn:hover {
  border-color: rgba(56,189,248,0.3);
  transform: translateY(-1px);
}

.emoji-btn .label {
  font-size: 9px; color: var(--dim); letter-spacing: 1px;
  text-transform: uppercase;
}

/* ─── Raid Chain ─────────────── */
.raid-chain {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 20px; margin-bottom: 32px;
}

.chain-title {
  font-size: 10px; font-weight: 700; letter-spacing: 3px;
  text-transform: uppercase; color: var(--teal); margin-bottom: 12px;
}

.chain-flow {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  font-size: 12px;
}

.chain-node {
  background: rgba(255,255,255,0.03); padding: 6px 12px;
  border-radius: 6px; color: var(--white); font-weight: 600;
}

.chain-arrow { color: var(--dim); font-size: 14px; }
</style>
</head>
<body>

<header>
  <div>
    <h1><span class="icon">⚡</span> TEE(n) Land Hotel Lobby</h1>
    <div class="header-sub">Exchange Bridge :8080 // Namespace: communityus-llc // bugfishhhh 🐛🐟</div>
  </div>
  <div class="node-badge">Node Registry Active</div>
</header>

<!-- Emoji Quick-Bar -->
<div class="emoji-bar" id="emojiBar"></div>

<!-- Node Grid -->
<div class="node-grid" id="nodeGrid"></div>

<!-- Raid Chain -->
<div class="raid-chain">
  <div class="chain-title">Raid Chain — Live Stream Network</div>
  <div class="chain-flow">
    <span class="chain-node">🥜 @communityusorg</span>
    <span class="chain-arrow">→</span>
    <span class="chain-node">📺 Chloe_IRLL</span>
    <span class="chain-arrow">→ raid →</span>
    <span class="chain-node">🧹 justketh</span>
    <span class="chain-arrow">→</span>
    <span class="chain-node">🧽 @TidyTowel4061</span>
    <span class="chain-arrow">→</span>
    <span class="chain-node">🏠 one.us.org</span>
    <span class="chain-arrow">→</span>
    <span class="chain-node">🐛 bugfishhhh</span>
  </div>
</div>

<!-- Terminal -->
<div class="terminal">
  <div class="terminal-header">
    <span class="terminal-icon">▶</span>
    <span class="terminal-title">Exchange :8080 Terminal</span>
  </div>
  <div class="terminal-log" id="terminalLog"></div>
</div>

<script>
// ─── Node Registry ────────────────────────────────────────────
const NODES = [
  {
    id: 'chloe', name: 'Chloe Sanctuary', type: 'YouTube',
    icon: '📺', status: 'ACTIVE', statusClass: 'status-active',
    borderClass: 'border-emerald',
    url: 'https://www.youtube.com/@Chloe_IRLL',
    desc: 'Belgium IRL trucking — Flemish anchor'
  },
  {
    id: 'justketh', name: 'JustKeth Raid', type: 'Twitch',
    icon: '🧹', status: 'SYNCED', statusClass: 'status-synced',
    borderClass: 'border-purple',
    url: 'https://www.twitch.tv/justketh',
    desc: 'Raid target — stream network hop'
  },
  {
    id: 'one.us.org', name: 'one.us.org', type: 'Community Route',
    icon: '🏠', status: 'ROOTED', statusClass: 'status-rooted',
    borderClass: 'border-sky',
    url: 'https://one.us.org',
    desc: 'communityus-llc namespace anchor'
  },
  {
    id: 'bugfishhhh', name: 'bugfishhhh', type: 'Sovereign Bot',
    icon: '🐛🐟', status: 'ARMED', statusClass: 'status-armed',
    borderClass: 'border-gold',
    url: null,
    desc: 'TDS probe / QA audit / quarantine classifier'
  },
  {
    id: 'tidytowel', name: '@TidyTowel4061', type: 'Stream Agent',
    icon: '🧽', status: 'PATROL', statusClass: 'status-patrol',
    borderClass: 'border-teal',
    url: null,
    desc: 'one.us.org route operator — justketh chat'
  },
  {
    id: 'drip', name: 'Backpack Drip', type: 'Render Pipeline',
    icon: '🎒', status: 'DRIP', statusClass: 'status-drip',
    borderClass: 'border-pink',
    url: null,
    desc: '1080 Ti live render → ambient revenue stream'
  },
  {
    id: 'kenya', name: 'Kenya Coffee', type: 'Orchestrator',
    icon: '☕', status: 'ACTIVE', statusClass: 'status-active',
    borderClass: 'border-emerald',
    url: 'http://localhost:8787',
    desc: 'Port health sweep — 4/4 plates spinning'
  }
];

const EMOJI_SEQUENCES = [
  { emoji: '🐛🐟', label: 'TDS Probe' },
  { emoji: '☣️🕷🖥', label: "Spy'Dir'E" },
  { emoji: '🧼💩🖥', label: 'Sanitizer' },
  { emoji: '🧊🛑🖥', label: 'Quarantine' },
  { emoji: '☕🔍', label: 'Kenya Sweep' },
  { emoji: '🎒📺🎞', label: 'Drip Stream' },
  { emoji: '🥜📺🖤', label: 'Chloe Signal' },
  { emoji: '🕵♀🏁', label: 'Sign Off' },
];

let activeNode = 'one.us.org';

// ─── Render ───────────────────────────────────────────────────
function renderNodes() {
  const grid = document.getElementById('nodeGrid');
  grid.innerHTML = NODES.map(n => `
    <div class="node-card ${n.borderClass} ${activeNode === n.id ? 'active' : ''}"
         onclick="selectNode('${n.id}')">
      <div class="node-emoji">${n.icon}</div>
      <div class="node-name">${n.name}</div>
      <div class="node-type">${n.type}</div>
      <div class="node-footer">
        <span class="node-status ${n.statusClass}">${n.status}</span>
        <svg class="node-git" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/>
          <path d="M18 9a9 9 0 0 1-9 9"/>
        </svg>
      </div>
    </div>
  `).join('');
}

function renderEmojiBar() {
  const bar = document.getElementById('emojiBar');
  bar.innerHTML = EMOJI_SEQUENCES.map(s => `
    <div class="emoji-btn" onclick="fireEmoji('${s.label}')">
      ${s.emoji} <span class="label">${s.label}</span>
    </div>
  `).join('');
}

function selectNode(id) {
  activeNode = id;
  renderNodes();
  const node = NODES.find(n => n.id === id);
  termLog(`>> Route initialization sequence initiated for ${node.name}`, 'cmd');
  termLog(`>> Referrer strip protocol: SUCCESS`, 'ok');
  termLog(`>> Namespaces synced: echads(26), communityus-llc(6), v2969flow(3), self-hosted(2)`, 'dim');
  termLog(`>> ${node.name} anchor confirmed at Hotel Lobby core.`, 'cmd');
  if (node.desc) termLog(`>> ${node.desc}`, 'dim');
}

function fireEmoji(label) {
  termLog(`>> 🐛 Emoji sequence fired: ${label}`, 'ok');
}

function termLog(msg, cls = 'dim') {
  const log = document.getElementById('terminalLog');
  log.innerHTML += `<div class="${cls}">${msg}</div>`;
  log.scrollTop = log.scrollHeight;
}

// ─── Init ─────────────────────────────────────────────────────
renderNodes();
renderEmojiBar();
termLog('>> TEE(n) Land Hotel Lobby initialized', 'cmd');
termLog('>> Exchange Bridge :8080 online', 'ok');
termLog('>> bugfishhhh 🐛🐟 classifier armed — KoboldCPP :5001', 'ok');
termLog('>> Raid chain: communityusorg → Chloe → justketh → TidyTowel → one.us.org → bugfishhhh', 'dim');
termLog('>> 7 nodes registered. Quarantine vectors loaded. Perimeter holds.', 'ok');
termLog('>> Awaiting commands...', 'dim');
</script>

</body>
</html>
