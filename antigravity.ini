; NFT Pipeline:
; 1. Token stores decentralized metadata URI → glTF/GLB package
; 2. Cloud microservices strip heavy Genesis mesh
; 3. Auto-bake textures to standard PBR channels
; 4. Output engine-ready optimized .glb
;
NFT_MetadataFormat=JSON URI → glTF/GLB package
NFT_Pipeline=Cloud microservices: strip Genesis mesh → bake PBR → output .glb
;
; Meta/Metaverse integration issues:
Meta_Issue=Bone rotation & T-pose fails (Daz Genesis vs MetaHuman/Unity Humanoid)
Meta_Fix=MetaTailor middleware — auto morph/skin-wrap/map to target rigs
