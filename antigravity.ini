; =============================================================================
; OPenE — Our Own Format
; "Takes the best part of each" — Echad
; Sovereign open format synthesizing the full rendering/asset lineage
; =============================================================================

[OPenE]
; OPenE = Open Pipeline Engine Format
; The convergence point of all research: a sovereign format that
; takes the best from every system in the genealogy.
;
; Heritage sources:
;   OpenEXR  → HDR precision, multi-channel layer architecture
;   glTF/GLB → Web-native, PBR-ready, compact binary packaging
;   Collada  → Cross-engine interop (.dae XML schema)
;   R3D/RMD  → Lossless quality, nondestructive metadata sidecars
;   ComfyUI  → Node graph automation (.json workflows)
;   USD      → Scene composition, layer override hierarchy
;
; Design principles (from research):
;   1. PBR-native channels (Metalness/Roughness/AO packed)
;   2. Nearest Neighbor for pixel art, Bilinear for photo
;   3. Nondestructive metadata (like .rmd sidecars)
;   4. Node graph serialization (like ComfyUI .json)
;   5. Bone-agnostic rigging (solves Daz↔MetaHuman T-pose wars)
;   6. Offline-first, sovereign-local storage
;   7. Web3/NFT metadata URI compatible (.glb output)
;   8. Open source (MIT-compatible)
;
Status=Designing
Pipeline=Pixel-to-Fin (Red Spark)
TargetFormats=.opene (container), .opene.json (manifest), .opene.glb (web3 output)
PBR_Channels=Red=Metalness, Green=Roughness, Blue=AO (matching OpenMW/Ogre conventions)
SidecarFormat=.opene.meta (nondestructive, XML-adjacent, like RED .rmd)
NodeGraph=ComfyUI-compatible .json workflow serialization
BoneSystem=Universal rig mapper (solves Daz Genesis ↔ MetaHuman ↔ Unity Humanoid)
;
; Rendering engine compatibility targets:
Compat.OpenMW=Via GLSL shader injection (zesterer/wareya pattern)
Compat.OgreNext=Via HLMS HlmsPbsDatablock
Compat.Godot=Via standard glTF import
Compat.Unity=Via glTF/GLB import + MetaTailor remapping
Compat.Vircadia=Via Convoar-style transcoding
Compat.Web3=Via NFT metadata URI → .glb package
Compat.Daz3D=Via .duf → .dae → .opene bridge

; ─── Rendering Engine Genealogy ───────────────────────────────
[GrokResearch.RenderingLineage]
; The full ancestry chain from low-level APIs to game engines
; OpenGL/DirectX/Vulkan/Metal → wrapper engines → game engines → mods
;
; Chain 1: OpenGL/D3D → Ogre3D → OpenMW (original) → switched to OSG
; Chain 2: OpenGL/D3D → custom C++ → TGE (Torque) → Minions of Mirth
; Chain 3: D3D9/11/OpenGL → Urho3D → Atomic Game Engine → rbfx
; Chain 4: Vulkan/Metal/D3D12 → OGRE-Next (2.x/3.x) with HLMS/PBS
;
TGE_Origin=Dynamix (Tribes 2 engine), GarageGames $100 indie license
TGE_Scripting=TorqueScript + Python (Minions of Mirth)
TGE_Rendering=Custom fixed-function C++ → Direct3D 7/8 + OpenGL
TSE_TGEA=Rewritten for programmable HLSL/GLSL pixel shaders
Torque3D=Open-source, deferred rendering, modern PBR
;
Ogre3D_Type=C++ object-oriented graphics wrapper (NOT a game engine)
Ogre3D_APIs=Vulkan, OpenGL/GL3Plus, Direct3D 11/12, Metal
Ogre3D_Classic_PBR=RTSS (Real-Time Shader System) since v13.3, glTF2 integration
OgreNext_PBR=Native HLMS (High-Level Material System) + HlmsPbsDatablock
OgreNext_Workflows=MetallicWorkflow, SpecularWorkflow
;
OpenMW_Original=Built on Ogre3D
OpenMW_Current=Migrated to OpenSceneGraph (OSG), custom fork on GitHub
OpenMW_PBR=No native OSG support; community GLSL shaders (zesterer, wareya)
OpenMW_PBR_Channels=Red=Metalness, Green=Roughness, Blue=AO
;
AtomicEngine=Forked from Urho3D, MIT license (open-sourced GDC 2016)
AtomicEngine_Languages=C++, JavaScript, TypeScript, C#
AtomicEngine_Status=Archived; successors = rbfx, Godot Engine
AtomicEngine_Repo=https://github.com/joorjoor/AtomicGameEngine
;
MinionsOfMirth=2005 indie MMORPG by Prairie Games, used TGE + Python
TorqueMMOKit=Prairie Games custom server cluster tool

; ─── PBR Pipeline Details ─────────────────────────────────────
[GrokResearch.PBR]
; Physically Based Rendering — core principles
Principle1=Energy Conservation (reflect <= receive)
Principle2=Microfacet Theory (smooth=tight specular, rough=scattered)
Principle3=Dielectric vs Metallic separation
;
OgreClassic_PBR_Material=rtshader_system { lighting_stage pbr metallic_roughness }
OgreClassic_Packing=Red=AO, Green=Roughness, Blue=Metalness
OgreNext_System=HlmsPbsDatablock (Cook-Torrance BRDF, automatic)
OpenMW_Shader=lighting_pbr.glsl (community GLSL fragment shaders)
IBL_Note=Image-Based Lighting needs skybox cubemap for ambient specular

; ─── RED Digital Cinema ───────────────────────────────────────
[GrokResearch.REDCinema]
REDCODE_RAW=.R3D (proprietary, mathematically lossless/near-lossless)
DSMC_Brain=Digital Still and Motion Camera modular system
REDCINE_X_PRO=Standalone review/grade/transcode software
RMD_Sidecar=.rmd (RED Metadata — XML-adjacent, nondestructive adjustments)
R3D_SDK=Free SDK for decoding .R3D in third-party tools (C++)
R3D_SDK_URL=https://www.red.com/download/r3d-sdk
NotOpenSource=.R3D is proprietary; SDK enables open-source tool integration

; ─── Misterblue / OpenSimulator → Vircadia Bridge ────────────
[GrokResearch.VirtualWorldBridge]
Developer=Robert Adams ("Misterblue")
Project=OpenSimulator → High Fidelity / Vircadia bridge
;
; Core issue: Legacy SL asset formats (Prims, Sculpties, LLSD)
;          vs Modern engines (glTF, JSON structs, PBR materials)
;
Convoar=Open-source OAR-to-glTF transcoding tool
Convoar_Purpose=Transcode OpenSim OAR region files → standardized glTF
BasilViewer=Experimental web-based 3D viewer
BasilOS_Repo=https://github.com/Misterblue/BasilOS
;
NetworkFix=WebTransport + async Task models (replacing legacy UDP callbacks)
ModernCapability=Native glTF content interface via login layer capability
LibreMetaverse=Updated from callback config to async Task models
;
Parallel=Same structural war as OpenMW .dae translation + our pipeline
Parallel_Issue=Decoupling legacy coordinates → open asset-isolated formats

; ─── MCS / Tafi → Daz 3D → NFT / Meta Bridge ─────────────────
[GrokResearch.Daz3D_NFT_Bridge]
MCS=Morph 3D Character System (Unity Asset Store, Genesis meshes)
MCS_Evolution=Morph 3D → Tafi (Daz 3D subsidiary)
Tafi_Purpose=Enterprise engine for exporting Daz infra to web/token platforms
